methodology_summary: >
  Hybrid ranker over precomputed candidate features. JD is parsed into required/
  preferred skills and an experience band. Each candidate is scored on skill match
  (gated by title fit so keyword-stuffed non-engineers don't rank), experience
  relevance, and a behavioral availability modifier (recruiter response rate,
  recency, open-to-work). Top-K shortlist is re-ranked deterministically and given
  fact-grounded reasoning. Runs offline, CPU-only, well under the 5-min budget.
