methodology_summary: >
  Hybrid, explainable candidate ranking over 100,000 profiles. The JD is parsed
  offline (regex + a skills taxonomy + rapidfuzz fuzzy matching) into required/
  preferred skills, an experience band, and role type. Each candidate is scored on
  four signals — skill match (fuzzy + semantic), experience relevance, growth index,
  and behavioral signals — combined as a weighted blend, then gated by a title-fit
  check so keyword-stuffed non-engineering profiles cannot rank at the top.
  Semantic similarity uses sentence-transformers all-MiniLM-L6-v2 embeddings,
  pre-computed offline once and looked up at rank time. The shortlist is re-ranked
  deterministically and each candidate is given a fact-grounded explanation.
  The ranking step runs offline, CPU-only, ranking 100K candidates in ~90 seconds
  (well under the 5-minute limit). No hosted LLM calls in the ranking path.
